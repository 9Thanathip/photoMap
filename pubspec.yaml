name: photo_map
description: "A photo mapping and travel tracking app for Thailand."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  google_fonts: ^6.2.0
  gap: ^3.0.1
  shared_preferences: ^2.3.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  photo_manager: ^3.2.0
  photo_manager_image_provider: ^2.2.0
  geocoding: ^3.0.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
